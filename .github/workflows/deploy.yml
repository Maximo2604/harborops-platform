name: HarborOps Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Sync app files to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::878598436021:role/harborops-github-actions-role
          aws-region: us-east-1

      - name: Sync app files to S3
        run: |
          aws s3 sync ./app s3://harborops-assets/app/
