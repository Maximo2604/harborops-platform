apiVersion: apps/v1
kind: Deployment
metadata:
  name: harborops
  labels:
    app: harborops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harborops
  template:
    metadata:
      labels:
        app: harborops
    spec:
      containers:
      - name: harborops
        image: 878598436021.dkr.ecr.us-east-1.amazonaws.com/harborops-app:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
